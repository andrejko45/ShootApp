services:

  backend:
    build: ./backend
    container_name: shoot_app_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env

  postgres:
    image: postgres:16
    container_name: shoot_postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: shoot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:
  postgres_data: