services:

  frontend:
    build: ./frontend
    container_name: shoot_app_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend


  backend:
    build: ./backend
    container_name: shoot_app_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: shoot_postgres

    restart: always

    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: shoot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:
  postgres_data: